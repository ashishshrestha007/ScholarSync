<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - ScholarSync</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .auth-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 2rem;
            position: relative;
        }
        .auth-card {
            background: var(--bg-glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border-glass);
            border-radius: var(--radius-lg);
            padding: 3rem;
            width: 100%;
            max-width: 450px;
            box-shadow: var(--shadow-glass);
        }
        .auth-header {
            text-align: center;
            margin-bottom: 2rem;
        }
        .auth-header i {
            font-size: 3rem;
            color: var(--accent-primary);
            margin-bottom: 1rem;
        }
        .auth-header h1 {
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
            font-weight: 700;
        }
        .form-group {
            margin-bottom: 1.5rem;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }
        .error-message {
            color: var(--accent-danger);
            font-size: 0.85rem;
            margin-top: 0.5rem;
            display: none;
        }
        .auth-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            font-size: 0.9rem;
        }
        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .checkbox-group input {
            cursor: pointer;
        }
        .forgot-link a {
            color: var(--accent-primary);
            text-decoration: none;
        }
        .forgot-link a:hover {
            text-decoration: underline;
        }
        .auth-footer {
            text-align: center;
            margin-top: 2rem;
            font-size: 0.9rem;
            color: var(--text-secondary);
        }
        .auth-footer a {
            color: var(--accent-primary);
            text-decoration: none;
            font-weight: 500;
        }
        .btn-full {
            width: 100%;
            padding: 1rem;
            font-size: 1rem;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <i class="fa-solid fa-graduation-cap"></i>
                <h1>Welcome Back</h1>
                <p>Login to ScholarSync</p>
            </div>
            
            <form id="login-form">
                <div id="general-error" class="error-message" style="margin-bottom: 1rem; text-align: center; font-size: 1rem;"></div>
                
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" class="glass-input" placeholder="student@example.com">
                    <div id="email-error" class="error-message">Email is required.</div>
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" class="glass-input" placeholder="••••••••">
                    <div id="password-error" class="error-message">Password is required.</div>
                </div>
                
                <div class="auth-options">
                    <div class="checkbox-group">
                        <input type="checkbox" id="remember">
                        <label for="remember" style="margin:0;">Remember me</label>
                    </div>
                    <div class="forgot-link">
                        <a href="#" onclick="alert('Feature coming soon for extra credit!')">Forgot Password?</a>
                    </div>
                </div>
                
                <button type="submit" class="btn btn-primary btn-full">
                    <i class="fa-solid fa-right-to-bracket"></i> Login
                </button>
            </form>
            
            <div class="auth-footer">
                Don't have an account? <a href="register.html">Register here</a>
            </div>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script>
        document.getElementById('login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const emailInputs = document.getElementById('email');
            const passInputs = document.getElementById('password');
            const email = emailInputs.value.trim();
            const password = passInputs.value;
            
            let hasError = false;
            
            // Empty check validation
            if (!email) {
                document.getElementById('email-error').style.display = 'block';
                hasError = true;
            } else {
                document.getElementById('email-error').style.display = 'none';
            }
            
            if (!password) {
                document.getElementById('password-error').style.display = 'block';
                hasError = true;
            } else {
                document.getElementById('password-error').style.display = 'none';
            }
            
            if (hasError) return;
            
            // Try login
            const result = await auth.login(email, password);
            if (result.error) {
                const errDiv = document.getElementById('general-error');
                errDiv.textContent = result.error;
                errDiv.style.display = 'block';
            } else {
                window.location.href = 'index.html';
            }
        });
    </script>
</body>
</html>
