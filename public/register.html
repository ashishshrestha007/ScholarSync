<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - ScholarSync</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .auth-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 2rem;
            position: relative;
        }
        .auth-card {
            background: var(--bg-glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border-glass);
            border-radius: var(--radius-lg);
            padding: 2.5rem;
            width: 100%;
            max-width: 500px;
            box-shadow: var(--shadow-glass);
        }
        .auth-header {
            text-align: center;
            margin-bottom: 2rem;
        }
        .auth-header h1 {
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
        }
        .form-group {
            margin-bottom: 1.25rem;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }
        .error-message {
            color: var(--accent-danger);
            font-size: 0.85rem;
            margin-top: 0.5rem;
            display: none;
        }
        .btn-full {
            width: 100%;
            padding: 1rem;
            font-size: 1rem;
            margin-top: 1rem;
        }
        /* Password Strength */
        .strength-bar {
            height: 5px;
            width: 100%;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            margin-top: 0.5rem;
            overflow: hidden;
            display: none;
        }
        .strength-fill {
            height: 100%;
            width: 0%;
            transition: all 0.3s ease;
        }
        .strength-text {
            font-size: 0.8rem;
            text-align: right;
            margin-top: 0.25rem;
            display: none;
        }
        select.glass-input {
            background-color: var(--bg-secondary); /* prevent white bg in dropdown */
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <h1>Create Account</h1>
                <p>Join ScholarSync</p>
            </div>
            
            <form id="register-form">
                <div id="general-error" class="error-message" style="margin-bottom: 1rem; text-align: center; font-size: 1rem;"></div>
                
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" class="glass-input" placeholder="John Doe">
                    <div id="name-error" class="error-message">Name is required.</div>
                </div>

                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" class="glass-input" placeholder="student@example.com">
                    <div id="email-error" class="error-message">Valid email format is required.</div>
                </div>


                
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" class="glass-input" placeholder="••••••••">
                    <div class="strength-bar" id="strength-bar">
                        <div class="strength-fill" id="strength-fill"></div>
                    </div>
                    <div class="strength-text" id="strength-text">Weak</div>
                    <div id="password-error" class="error-message">Password is required.</div>
                </div>

                <div class="form-group">
                    <label for="confirm-password">Confirm Password</label>
                    <input type="password" id="confirm-password" class="glass-input" placeholder="••••••••">
                    <div id="confirm-error" class="error-message">Passwords do not match.</div>
                </div>
                
                <button type="submit" class="btn btn-primary btn-full">
                    Register
                </button>
            </form>
            
            <div class="auth-footer" style="text-align: center; margin-top: 1.5rem; font-size: 0.9rem;">
                Already have an account? <a href="login.html" style="color:var(--accent-primary)">Login here</a>
            </div>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script>
        const pwdInput = document.getElementById('password');
        const sBar = document.getElementById('strength-bar');
        const sFill = document.getElementById('strength-fill');
        const sText = document.getElementById('strength-text');

        pwdInput.addEventListener('input', (e) => {
            const val = e.target.value;
            sBar.style.display = val ? 'block' : 'none';
            sText.style.display = val ? 'block' : 'none';
            
            // Basic strength logic
            let strength = 0;
            if (val.length >= 6) strength++;
            if (val.length >= 10) strength++;
            if (/[A-Z]/.test(val)) strength++;
            if (/[0-9]/.test(val)) strength++;
            if (/[^A-Za-z0-9]/.test(val)) strength++;

            if (val.length === 0) {
                sFill.style.width = '0%';
            } else if (strength <= 1) {
                sFill.style.width = '25%';
                sFill.style.background = 'var(--accent-danger)';
                sText.textContent = 'Weak';
                sText.style.color = 'var(--accent-danger)';
            } else if (strength <= 3) {
                sFill.style.width = '60%';
                sFill.style.background = 'var(--accent-warning)';
                sText.textContent = 'Medium';
                sText.style.color = 'var(--accent-warning)';
            } else {
                sFill.style.width = '100%';
                sFill.style.background = 'var(--accent-success)';
                sText.textContent = 'Strong';
                sText.style.color = 'var(--accent-success)';
            }
        });

        document.getElementById('register-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const name = document.getElementById('name').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = pwdInput.value;
            const confirm = document.getElementById('confirm-password').value;
            
            let hasError = false;
            
            const nameRegex = /^[A-Za-z\s]+$/;
            if (!name || !nameRegex.test(name)) { 
                document.getElementById('name-error').textContent = 'Please enter a valid real name (letters only).';
                document.getElementById('name-error').style.display = 'block'; 
                hasError = true; 
            } else {
                document.getElementById('name-error').style.display = 'none';
            }

            // Email format validation
            const emailRegex = /^[a-z0-9._%+-]+@(gmail\.com|yahoo\.com)$/;
            const emailLocal = email.split('@')[0] || '';
            const isLocalOnlyNumbers = /^[0-9]+$/.test(emailLocal);

            if (!email || !emailRegex.test(email) || isLocalOnlyNumbers) { 
                document.getElementById('email-error').textContent = 'Valid @gmail.com or @yahoo.com required (username cannot be only numbers).';
                document.getElementById('email-error').style.display = 'block'; 
                hasError = true; 
            } else {
                document.getElementById('email-error').style.display = 'none';
            }
            
            const passwordRegex = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d).{8,}$/;
            if (!password || !passwordRegex.test(password)) { 
                document.getElementById('password-error').textContent = 'Password must be at least 8 chars with 1 uppercase and 1 number.';
                document.getElementById('password-error').style.display = 'block'; 
                hasError = true; 
            } else {
                document.getElementById('password-error').style.display = 'none';
            }

            if (password !== confirm || !confirm) {
                document.getElementById('confirm-error').style.display = 'block'; 
                hasError = true;
            } else {
                document.getElementById('confirm-error').style.display = 'none';
            }
            
            if (hasError) return;
            
            // Try register
            const result = await auth.register(name, email, password);
            if (result.error) {
                const errDiv = document.getElementById('general-error');
                errDiv.textContent = result.error;
                errDiv.style.display = 'block';
            } else {
                // Auto login or redirect
                alert('Registration successful! Please login.');
                window.location.href = 'login.html';
            }
        });
    </script>
</body>
</html>
